<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS · Secure Chat</title>
  <style>
    /* ===== RESET & GLOBAL ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* ===== ANIMATED BACKGROUND ===== */
    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(45, 0, 255, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(255, 0, 200, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 30% 80%, rgba(0, 255, 255, 0.1) 0%, transparent 50%);
      z-index: 0;
      animation: pulse 10s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      0% { opacity: 0.5; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.05); }
    }

    /* ===== MAIN APP CONTAINER ===== */
    #app {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 1400px;
      height: 90vh;
      background: rgba(20, 20, 30, 0.7);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-radius: 48px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transform-style: preserve-3d;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    #app:hover {
      transform: perspective(2000px) rotateX(2deg) rotateY(1deg) translateZ(10px);
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), 0 0 0 2px rgba(100, 150, 255, 0.3) inset;
    }

    /* ===== LOGIN SCREEN ===== */
    #login {
      padding: 40px;
      text-align: center;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(8px);
      border-radius: 48px 48px 0 0;
      transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    #login h1 {
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #aaffff, #bf7aff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(170, 255, 255, 0.5);
      margin-bottom: 40px;
      letter-spacing: -0.02em;
      animation: glowPulse 3s infinite alternate;
    }

    @keyframes glowPulse {
      0% { text-shadow: 0 0 20px rgba(170, 255, 255, 0.3); }
      100% { text-shadow: 0 0 60px rgba(191, 122, 255, 0.8); }
    }

    #login input {
      width: 400px;
      max-width: 80%;
      padding: 20px 30px;
      font-size: 1.2rem;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 60px;
      color: white;
      outline: none;
      transition: all 0.3s;
      backdrop-filter: blur(4px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      margin-bottom: 20px;
    }

    #login input:focus {
      border-color: #7aa2ff;
      box-shadow: 0 0 30px #7aa2ff66;
    }

    #login button {
      padding: 20px 50px;
      font-size: 1.3rem;
      font-weight: 600;
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      border: none;
      border-radius: 60px;
      color: white;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1);
    }

    #login button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.7s;
    }

    #login button:hover {
      transform: scale(1.05) translateY(-3px);
      box-shadow: 0 25px 45px rgba(122, 162, 255, 0.4);
    }

    #login button:hover::before {
      left: 100%;
    }

    /* ===== MAIN CHAT LAYOUT ===== */
    #main {
      flex: 1; /* Take remaining space after login */
      display: flex;
      flex-direction: row;
      min-height: 0; /* Allow flex child to shrink */
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    #main[style*="display: flex"] {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== USERS PANEL (LEFT) ===== */
    #users {
      width: 320px;
      background: rgba(10, 10, 15, 0.6);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(255, 255, 255, 0.05);
      padding: 25px 15px;
      overflow-y: auto;
      transition: all 0.3s;
    }

    #users h3 {
      font-size: 1.4rem;
      font-weight: 500;
      color: #ccc;
      margin-bottom: 25px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 15px;
    }

    #userList {
      list-style: none;
    }

    #userList li {
      padding: 15px 20px;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 30px;
      color: #eee;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      transform-style: preserve-3d;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(4px);
    }

    #userList li:hover {
      transform: translateY(-3px) translateZ(10px) rotateX(2deg);
      background: rgba(122, 162, 255, 0.15);
      border-color: #7aa2ff;
      box-shadow: 0 15px 30px rgba(122, 162, 255, 0.3);
    }

    /* ===== CHAT AREA (RIGHT) ===== */
    #chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(8px);
      padding: 25px;
      min-height: 0; /* Allow flex child to shrink */
      overflow: hidden;
    }

    /* MESSAGES CONTAINER */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding-right: 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: #7aa2ff #1a1a2a;
    }

    #messages::-webkit-scrollbar {
      width: 6px;
    }
    #messages::-webkit-scrollbar-track {
      background: #1a1a2a;
      border-radius: 10px;
    }
    #messages::-webkit-scrollbar-thumb {
      background: #7aa2ff;
      border-radius: 10px;
      box-shadow: 0 0 15px #7aa2ff;
    }

    /* MESSAGE BUBBLES */
    .message {
      max-width: 65%;
      padding: 14px 20px;
      border-radius: 30px;
      word-wrap: break-word;
      position: relative;
      animation: messageAppear 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(4px);
      transform-style: preserve-3d;
      transition: transform 0.2s;
    }

    .message:hover {
      transform: translateY(-2px) translateZ(5px);
    }

    .message.me {
      align-self: flex-end;
      background: linear-gradient(145deg, #1e3a5f, #0f2b45);
      border: 1px solid rgba(122, 162, 255, 0.5);
      border-bottom-right-radius: 6px;
      box-shadow: 0 5px 20px rgba(122, 162, 255, 0.3);
    }

    .message.them {
      align-self: flex-start;
      background: rgba(30, 30, 40, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom-left-radius: 6px;
    }

    .timestamp {
      font-size: 0.65rem;
      color: #aaa;
      margin-top: 6px;
      text-align: right;
      letter-spacing: 0.5px;
    }

    @keyframes messageAppear {
      0% { opacity: 0; transform: translateY(20px) scale(0.9); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* INPUT AREA */
    .input-area {
      display: flex;
      margin: 20px 0 10px;
      gap: 12px;
    }

    #messageInput {
      flex: 1;
      padding: 18px 25px;
      background: rgba(20, 20, 30, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50px;
      font-size: 1rem;
      color: white;
      outline: none;
      backdrop-filter: blur(4px);
      transition: all 0.3s;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    #messageInput:focus {
      border-color: #7aa2ff;
      box-shadow: 0 0 30px rgba(122, 162, 255, 0.3);
    }

    #sendBtn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(145deg, #1e3a5f, #0f2b45);
      border: none;
      color: white;
      font-size: 1.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
    }

    #sendBtn::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    #sendBtn:hover {
      transform: scale(1.1) rotate(5deg);
      box-shadow: 0 0 30px #7aa2ff;
    }

    #sendBtn:hover::after {
      opacity: 1;
    }

    /* FILE INPUT & PROGRESS */
    #fileInput {
      display: none;
    }

    .file-label {
      padding: 12px 25px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px dashed rgba(255, 255, 255, 0.2);
      border-radius: 40px;
      color: #ccc;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(4px);
      margin-right: 10px;
    }

    .file-label:hover {
      background: rgba(122, 162, 255, 0.1);
      border-color: #7aa2ff;
    }

    #sendFileBtn {
      padding: 12px 25px;
      background: linear-gradient(145deg, #2a2a3a, #1a1a2a);
      border: none;
      border-radius: 40px;
      color: white;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    #sendFileBtn:hover {
      background: #1e3a5f;
      transform: translateY(-2px);
      box-shadow: 0 10px 25px #7aa2ff66;
    }

    #progress {
      margin-top: 15px;
      font-size: 0.9rem;
      color: #7aa2ff;
      text-shadow: 0 0 10px currentColor;
    }

    /* BLE & PAYMENTS SECTIONS */
    #ble-section, #payment-section {
      margin-top: 25px;
      padding: 20px;
      background: rgba(10, 10, 15, 0.6);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s;
      max-height: 280px;
      overflow-y: auto;
    }

    #ble-section:hover, #payment-section:hover {
      border-color: #7aa2ff44;
      box-shadow: 0 0 30px #7aa2ff22;
    }

    #ble-section h3, #payment-section h3 {
      color: #ddd;
      font-weight: 400;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    #nearbyDevices button {
      margin: 5px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      color: white;
      cursor: pointer;
      transition: all 0.3s;
    }

    #nearbyDevices button:hover {
      background: #7aa2ff33;
      border-color: #7aa2ff;
    }

    #hyperswitch-payment-element {
      margin: 15px 0;
      padding: 20px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    #hyperswitch-pay-button, #hyperswitch-confirm-button {
      padding: 15px 30px;
      background: linear-gradient(145deg, #1e3a5f, #0f2b45);
      border: none;
      border-radius: 50px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }

    #hyperswitch-pay-button:hover, #hyperswitch-confirm-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px #7aa2ff;
    }

    #testnet-faucet {
      margin-top: 20px;
      padding: 15px;
      text-align: center;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 30px;
      color: #aaa;
    }

    #testnet-faucet a {
      color: #7aa2ff;
      text-decoration: none;
      margin: 0 10px;
      transition: all 0.3s;
    }

    #testnet-faucet a:hover {
      text-shadow: 0 0 15px #7aa2ff;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      #main {
        flex-direction: column;
      }
      #users {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        max-height: 200px;
      }
      .message {
        max-width: 85%;
      }
    }
  </style>
</head>
<body>
  <!-- Animated particle background -->
  <canvas id="particle-canvas"></canvas>
  <div class="gradient-bg"></div>

  <div id="app">
    <!-- LOGIN -->
    <div id="login">
      <h1>NEXUS</h1>
      <input id="username" placeholder="Enter your identity" />
      <button id="joinBtn">ENTER THE GRID</button>
    </div>

    <!-- MAIN CHAT -->
    <div id="main" style="display: none;">
      <!-- Users Panel -->
      <div id="users">
        <h3>CONNECTED NODES</h3>
        <ul id="userList"></ul>
      </div>

      <!-- Chat Panel -->
      <div id="chat">
        <div id="messages"></div>

        <!-- Message Input -->
        <div class="input-area">
          <input id="messageInput" placeholder="Type your message..." />
          <button id="sendBtn">➤</button>
        </div>

        <!-- File Sharing -->
        <div style="display: flex; align-items: center; gap: 10px;">
          <label for="fileInput" class="file-label">📎 Attach File</label>
          <input type="file" id="fileInput" />
          <button id="sendFileBtn">Send File</button>
        </div>
        <div id="progress"></div>

        <!-- BLE Section -->
        <div id="ble-section">
          <h3>⚡ OFFLINE MESH</h3>
          <button id="enableBLEBtn">Enable BLE</button>
          <button id="disableBLEBtn" disabled>Disable BLE</button>
          <div id="nearbyDevices"></div>
        </div>

        <!-- Payment Section -->
        <div id="payment-section">
          <h3>💎 PRIVATE PAYMENTS</h3>
          <div id="wallet-info">
            <p>Wallet: <span id="wallet-address"></span></p>
            <p>Network: <span id="network-name">Sepolia</span></p>
          </div>

          <div id="balances">
            <h4>Balances</h4>
            <div id="balance-list"></div>
            <button id="refresh-balances">Refresh</button>
          </div>

          <!-- USDC Payment -->
          <div id="payment-actions">
            <h4>Send USDC</h4>
            <select id="token-select">
              <option value="usdc">USDC</option>
              <option value="usdt">USDT</option>
              <option value="dai">DAI</option>
            </select>
            <input id="payment-amount" type="number" step="0.01" placeholder="Amount">
            <input id="recipient-address" type="text" placeholder="Recipient address">
            <button id="send-private-payment">Send Private Payment</button>
            <div id="payment-status"></div>
          </div>

          <!-- Hyperswitch -->
          <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">
          <h4>🌍 GLOBAL PAYMENTS</h4>
          <button id="hyperswitch-pay-button">Pay with Hyperswitch</button>
          <div id="hyperswitch-payment-element"></div>
          <div id="hyperswitch-status"></div>
        </div>
      </div>
    </div>

    <!-- Testnet Faucet -->
    <div id="testnet-faucet">
      <p>Testnet tokens: <a href="https://sepolia-faucet.pk910.de/" target="_blank">ETH</a> | <a href="https://faucet.circle.com/" target="_blank">USDC</a></p>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="lib/crypto-js.min.js"></script>
  <script src="lib/ethers.min.js"></script>
  <script src="lib/hyperswitch.js"></script>
  <script src="client.js" type="module"></script>

  <!-- Particle animation script -->
  <script>
    (function() {
      const canvas = document.getElementById('particle-canvas');
      const ctx = canvas.getContext('2d');
      let width, height;
      let particles = [];

      function initParticles() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        particles = [];
        for (let i = 0; i < 100; i++) {
          particles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            radius: Math.random() * 2 + 1,
            speedX: (Math.random() - 0.5) * 0.5,
            speedY: (Math.random() - 0.5) * 0.5,
            color: `rgba(122, 162, 255, ${Math.random() * 0.3 + 0.2})`
          });
        }
      }

      function drawParticles() {
        ctx.clearRect(0, 0, width, height);
        particles.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();

          // move
          p.x += p.speedX;
          p.y += p.speedY;

          // wrap around
          if (p.x < 0) p.x = width;
          if (p.x > width) p.x = 0;
          if (p.y < 0) p.y = height;
          if (p.y > height) p.y = 0;
        });
        requestAnimationFrame(drawParticles);
      }

      window.addEventListener('resize', () => {
        initParticles();
      });

      initParticles();
      drawParticles();
    })();
  </script>
</body>
</html>
