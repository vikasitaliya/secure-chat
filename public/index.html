<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS · Quantum Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Three.js canvas for 3D background -->
  <canvas id="bg-canvas"></canvas>

  <div id="app">
    <!-- LOGIN -->
    <div id="login" class="visible">
      <h1>✨ NEXUS ✨</h1>
      <input id="username" placeholder="Enter your identity" />
      <button id="joinBtn">ENTER THE GRID</button>
    </div>

    <!-- MAIN CHAT (initially hidden) -->
    <div id="main" class="hidden">
      <!-- Users Panel -->
      <div id="users">
        <h3>⚡ CONNECTED NODES</h3>

        <!-- Group list -->
        <div class="group-section">
          <div class="group-header">
            <h4>GROUPS</h4>
            <button id="createGroupBtn" class="btn-small">➕</button>
          </div>
          <div id="groupList"></div>
        </div>

        <ul id="userList"></ul>
      </div>

      <!-- Chat Panel -->
      <div id="chat">
        <!-- Group Chat Header (hidden by default) -->
        <div id="groupChatHeader" class="hidden">
          <span id="currentGroupName"></span>
          <button id="leaveGroupBtn">✖</button>
        </div>

        <div id="messages"></div>

        <!-- Typing indicator (hidden by default) -->
        <div id="typing-indicator" class="typing hidden">
          <span></span><span></span><span></span>
        </div>

        <!-- Message Input -->
        <div class="input-area">
          <input id="messageInput" placeholder="Type your message..." />
          <button id="sendBtn">➤</button>
        </div>

        <!-- File Sharing -->
        <div class="file-row">
          <label for="fileInput" class="file-label">📎 Attach File</label>
          <input type="file" id="fileInput" />
          <button id="sendFileBtn" class="btn-outline">Send File</button>
        </div>
        <div id="progress"></div>
      </div>

      <!-- Bottom Panel (BLE & Payments) -->
      <div id="bottom-panel">
        <!-- BLE Section -->
        <div class="panel-section">
          <h3>⚡ OFFLINE MESH</h3>
          <button id="enableBLEBtn" class="btn">Enable BLE</button>
          <button id="disableBLEBtn" class="btn-outline" disabled>Disable</button>
          <div id="nearbyDevices"></div>
        </div>

        <!-- Payments Section -->
        <div class="panel-section">
          <h3>💎 QUANTUM PAYMENTS</h3>
          <div class="wallet-card">
            <div class="wallet-row">
              <span>Wallet</span>
              <span class="wallet-address" id="wallet-address"></span>
            </div>
            <div class="network-row">Network: <span id="network-name">Sepolia</span></div>
          </div>

          <div id="balances">
            <h4>Balances</h4>
            <div id="balance-list"></div>
            <button id="refresh-balances" class="btn-outline">↻ Refresh</button>
          </div>

          <!-- USDC Payment -->
          <div class="payment-form">
            <h4>Send USDC</h4>
            <select id="token-select">
              <option value="usdc">USDC</option>
              <option value="usdt">USDT</option>
              <option value="dai">DAI</option>
            </select>
            <input id="payment-amount" type="number" step="0.01" placeholder="Amount">
            <input id="recipient-address" type="text" placeholder="Recipient address">
            <button id="send-private-payment" class="btn">Send Private Payment</button>
            <div id="payment-status"></div>
          </div>

          <!-- Hyperswitch -->
          <hr>
          <h4>🌍 GLOBAL PAYMENTS</h4>
          <button id="hyperswitch-pay-button" class="btn">Pay with Hyperswitch</button>
          <div id="hyperswitch-payment-element"></div>
          <div id="hyperswitch-status"></div>
        </div>
      </div>
    </div>

    <!-- Testnet Faucet -->
    <div class="faucet">
      Testnet tokens: <a href="https://sepolia-faucet.pk910.de/" target="_blank">ETH</a> | <a href="https://faucet.circle.com/" target="_blank">USDC</a>
    </div>
  </div>

  <!-- Group Member Selection Modal (hidden by default) -->
  <div id="groupModal" class="hidden">
    <div class="modal-content">
      <h3>Select Group Members</h3>
      <div id="modalUserList"></div>
      <div class="modal-actions">
        <input id="groupNameInput" type="text" placeholder="Group name">
        <button id="createGroupConfirm" class="btn">Create</button>
        <button id="cancelGroupModal" class="btn-outline">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="lib/crypto-js.min.js"></script>
  <script src="lib/ethers.min.js"></script>
  <script src="lib/hyperswitch.js"></script>
  <!-- localForage for persistent storage -->
  <script src="lib/localforage.min.js"></script>
  <script src="client.js" type="module"></script>

  <!-- Three.js for 3D background -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.126.0/build/three.module.js"
      }
    }
  </script>
  <script type="module" src="background.js"></script>
</body>
</html>
