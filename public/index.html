<!DOCTYPE html>
<html>
<head>
    <title>Secure Chat + Private Payments</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        #login { margin-bottom: 20px; }
        #users { float: left; width: 200px; border-right: 1px solid #ccc; padding-right: 20px; }
        #chat { margin-left: 240px; }
        #messages { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; }
        #messageInput { width: 80%; }
        #ble-section, #payment-section { margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px; }
        #nearbyDevices button { margin: 5px; }
        #payment-status { margin-top: 10px; font-size: 0.9em; }
        #testnet-faucet { font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>Secure Chat + Private Payments (AES-256 Encrypted)</h1>
    <div id="login">
        <input id="username" placeholder="Your name" />
        <button id="joinBtn">Join</button>
    </div>
    <div id="users">
        <h3>Online Users</h3>
        <ul id="userList"></ul>
    </div>
    <div id="chat" style="display:none;">
        <div id="messages"></div>
        <input id="messageInput" placeholder="Type a message..." />
        <button id="sendBtn">Send</button>
        <br/><br/>
        <input type="file" id="fileInput" />
        <button id="sendFileBtn">Send File</button>
        <div id="progress"></div>

        <!-- BLE Section -->
        <hr/>
        <div id="ble-section">
            <h3>Offline Mesh (Bluetooth)</h3>
            <button id="enableBLEBtn">Enable BLE Mode</button>
            <button id="disableBLEBtn" disabled>Disable BLE</button>
            <div id="nearbyDevices"></div>
        </div>

        <!-- Payment Section -->
        <hr/>
        <div id="payment-section">
            <h3>💰 Private Payments</h3>
            <div id="wallet-info">
                <p>Wallet: <span id="wallet-address"></span></p>
                <p>Network: <span id="network-name">Goerli (Testnet)</span></p>
            </div>
            
            <div id="balances">
                <h4>Shielded Balances</h4>
                <div id="balance-list"></div>
                <button id="refresh-balances">Refresh</button>
            </div>
            
            <div id="payment-actions">
                <h4>Send Private Payment</h4>
                <select id="token-select">
                    <option value="usdc">USDC</option>
                    <option value="usdt">USDT</option>
                    <option value="dai">DAI</option>
                </select>
                <input id="payment-amount" type="number" step="0.01" placeholder="Amount">
                <input id="recipient-address" type="text" placeholder="Recipient's private address">
                <button id="send-private-payment">Send Private Payment</button>
                <div id="payment-status"></div>
            </div>
            
            <div id="testnet-faucet">
                <p><strong>Testnet Mode</strong> - Get free test tokens:</p>
                <a href="https://goerlifaucet.com/" target="_blank">Goerli ETH Faucet</a> | 
                <a href="https://faucet.circle.com/" target="_blank">USDC Faucet</a>
            </div>
        </div>
    </div>

    <!-- Scripts – all local to avoid tracking prevention -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="lib/crypto-js.min.js"></script>
    <script src="lib/ethers.min.js"></script>
    <script src="client.js" type="module"></script>
</body>
</html>
